<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <!-- Main gradient matching the website theme -->
    <linearGradient id="logoGradientStacked" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>

    <!-- Subtle glow effect -->
    <filter id="glowStacked">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main logo square with rounded corners -->
  <rect
    x="25"
    y="20"
    width="150"
    height="150"
    rx="28"
    ry="28"
    fill="url(#logoGradientStacked)"
    filter="url(#glowStacked)"
  />

  <!-- Letter Q with professional styling -->
  <text
    x="100"
    y="122"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-size="100"
    font-weight="700"
    text-anchor="middle"
    fill="white"
  >Q</text>

  <!-- "Quantum QE" text below icon -->
  <text
    x="100"
    y="210"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-size="32"
    font-weight="700"
    text-anchor="middle"
    fill="#0f172a"
  >Quantum QE</text>
</svg>
