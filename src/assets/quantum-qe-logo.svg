<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <!-- Main gradient matching the website theme -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>

    <!-- Subtle glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main logo square with rounded corners -->
  <rect
    x="10"
    y="20"
    width="80"
    height="80"
    rx="16"
    ry="16"
    fill="url(#logoGradient)"
    filter="url(#glow)"
  />

  <!-- Letter Q with professional styling -->
  <text
    x="50"
    y="75"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-size="56"
    font-weight="700"
    text-anchor="middle"
    fill="white"
  >Q</text>

  <!-- "Quantum QE" text matching home page style -->
  <text
    x="105"
    y="73"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-size="38"
    font-weight="700"
    fill="#0f172a"
  >Quantum QE</text>
</svg>
