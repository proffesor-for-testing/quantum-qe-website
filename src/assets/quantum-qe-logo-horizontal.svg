<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
  <defs>
    <!-- Main gradient matching the website theme -->
    <linearGradient id="logoGradientH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Logo icon square -->
  <rect
    x="5"
    y="10"
    width="60"
    height="60"
    rx="12"
    ry="12"
    fill="url(#logoGradientH)"
  />

  <!-- Letter Q -->
  <text
    x="35"
    y="56"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-size="44"
    font-weight="700"
    text-anchor="middle"
    fill="white"
  >Q</text>

  <!-- "Quantum QE" text matching home page style -->
  <text
    x="80"
    y="52"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-size="32"
    font-weight="700"
    fill="#0f172a"
  >Quantum QE</text>
</svg>
